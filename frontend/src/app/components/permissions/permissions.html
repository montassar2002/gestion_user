<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gestion des Permissions</h2>
    <button class="btn btn-primary" (click)="openForm()">+ Ajouter</button>
  </div>

  <div class="card mb-4" *ngIf="showForm">
    <div class="card-header bg-primary text-white">
      {{ isEdit ? 'Modifier' : 'Ajouter' }} Permission
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Nom</label>
        <input type="text" class="form-control" [(ngModel)]="form.nom">
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" class="form-control" [(ngModel)]="form.description">
      </div>
      <button class="btn btn-success me-2" (click)="savePermission()">Enregistrer</button>
      <button class="btn btn-secondary" (click)="cancel()">Annuler</button>
    </div>
  </div>

  <table class="table table-bordered table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of permissions">
        <td>{{ p.idPermission }}</td>
        <td>{{ p.nom }}</td>
        <td>{{ p.description }}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" (click)="editPermission(p)">Modifier</button>
          <button class="btn btn-sm btn-danger" (click)="deletePermission(p.idPermission)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
